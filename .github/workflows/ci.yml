name: Test and Deploy Web

on:
  push:
    branches: [main, github-action]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Unit Tests
        run: npm test --if-present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  deploy-web:
    needs: test-and-lint
    runs-on: ubuntu-latest
    # Only deploy on push to main or github-action
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/github-action')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Install Web Dependencies
        run: npm install react-dom react-native-web --save

      - name: Build Web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 1. Build the app for web
          EXPO_USE_STATIC=false npx expo export --platform web --clear

          # 2. Fix the HTML script tags (Using relative paths for GH Pages)
          # This ensures the browser looks for files in ./ instead of /
          sed -i 's|src="/_expo|src="./_expo|g' dist/index.html
          sed -i 's|href="/_expo|href="./_expo|g' dist/index.html

          # 3. Fix Asset Paths in the JS bundles
          # This helps images and scripts load correctly on a sub-path URL
          grep -rli '"/assets/' dist/_expo/static/js/web/ | xargs -I@ sed -i 's|"/assets/|"./assets/|g' @ || true
          grep -rli '"/_expo/static/assets/' dist/_expo/static/js/web/ | xargs -I@ sed -i 's|"/_expo/static/assets/|"./_expo/static/assets/|g' @ || true

          # 4. Deployment preparation
          touch dist/.nojekyll
          cp dist/index.html dist/404.html
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          single-commit: true