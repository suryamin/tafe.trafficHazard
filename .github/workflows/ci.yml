name: Test and Deploy Web

on:
  push:
    branches: [main, github-action]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Unit Tests
        run: npm test --if-present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  deploy-web:
    needs: test-and-lint
    runs-on: ubuntu-latest
    # Only deploy on push to main or github-action
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/github-action')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Install Web Dependencies
        run: npm install react-dom react-native-web --save

      - name: Build Web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 1. Build with the explicit base path for your repo
          # This replaces the need for most of your sed commands
          npx expo export --platform web --clear --output-dir dist
          
          # 2. Add the .nojekyll file to stop GitHub from ignoring _expo folders
          touch dist/.nojekyll
          
          # 3. Create a 404.html from index.html to support SPA routing
          cp dist/index.html dist/404.html

          # 4. Optional: Only use sed if the index.html still has an absolute root slash
          sed -i 's|src="/|src="./|g' dist/index.html
          sed -i 's|href="/|href="./|g' dist/index.html
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          single-commit: true