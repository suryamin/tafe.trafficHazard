name: Test and Deploy Web

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Linting
        run: |
          if [ -f "./node_modules/.bin/eslint" ]; then
            ./node_modules/.bin/eslint . || true
          else
            echo "ESLint not found, skipping..."
          fi

      - name: Run Unit Tests
        run: npm test --if-present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  deploy-web:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # Needed to push to gh-pages branch
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Web Dependencies
        run: npx expo install react-dom react-native-web
        
      - name: Build Web Version
        # This creates the 'dist' folder with the correct pathing
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_BASE_PATH: /tafe.trafficHazard/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }} # Explicitly add this
          clean: true