name: Test and Deploy Web

on:
  pull_request:
    branches: [main, github-action]
  push:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Linting
        run: |
          if [ -f "./node_modules/.bin/eslint" ]; then
            ./node_modules/.bin/eslint . || true
          else
            echo "ESLint not found, skipping..."
          fi

      - name: Run Unit Tests
        run: npm test --if-present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  deploy-web:
    needs: test-and-lint
    runs-on: ubuntu-latest
    # Updated to allow deployment from both main and your github-action branch
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/github-action')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo Web Dependencies
        run: npx expo install react-dom react-native-web

      - name: Build Web Version
        run: |
          # 1. Nuke old builds
          rm -rf .expo dist
          
          # 2. Export with NO base path (defaults to /)
          npx expo export --platform web --clear
          
          # 3. Aggressive Path Fix: 
          # This removes ANY leading slash from src= or href= attributes
          # so they become relative to the current folder.
          sed -i 's/src="\//src="/g' dist/index.html
          sed -i 's/href="\//href="/g' dist/index.html
          
          # 4. Create the 404 redirect
          cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          single-commit: true 
          clean: true