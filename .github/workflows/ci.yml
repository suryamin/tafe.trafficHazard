name: Test and Deploy Web

on:
  push:
    branches: [main, github-action]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Unit Tests
        run: npm test --if-present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  deploy-web:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/github-action')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web
        env:
          # These must match the names in your GitHub Repo Secrets
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 1. Build the app (generates the dist folder)
          # The env variables above are injected into the JS bundle here
          EXPO_USE_STATIC=false npx expo export --platform web --clear

          # 2. Fix the HTML script tags in index.html (Injecting tafe.trafficHazard)
          sed -i 's|src="/_expo|src="/tafe.trafficHazard/_expo|g' dist/index.html
          sed -i 's|href="/_expo|href="/tafe.trafficHazard/_expo|g' dist/index.html

          # 3. FIX THE ASSETS (Path A: Standard Assets)
          grep -rli '"/assets/' dist/_expo/static/js/web/ | xargs -I@ sed -i 's|"/assets/|"/tafe.trafficHazard/assets/|g' @ || true

          # 4. FIX THE ASSETS (Path B: Static Assets)
          grep -rli '"/_expo/static/assets/' dist/_expo/static/js/web/ | xargs -I@ sed -i 's|"/_expo/static/assets/|"/tafe.trafficHazard/_expo/static/assets/|g' @ || true

          # 5. CRITICAL: Prevent GitHub from hiding the _expo folder
          touch dist/.nojekyll
          
          # 6. Create 404 redirect for SPA support
          cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          single-commit: true